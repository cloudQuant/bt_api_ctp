site_name: "CTP (China Futures) Documentation"
site_description: "CTP (China Futures) plugin for bt_api"
site_author: cloudQuant
site_url: https://bt-api-ctp.readthedocs.io/

repo_name: cloudQuant/bt_api_ctp
repo_url: https://github.com/cloudQuant/bt_api_ctp

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  plugins:
    - search
    - i18n:
        docs_structure: suffix
        fallback_to_default: true
        reconfigure_material: true
        reconfigure_search: true
        languages:
          en:
            name: English
            build: true
          zh:
            name: 中文
            build: true

nav:
  - Home: index.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - tables
